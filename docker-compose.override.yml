# Docker Compose override for development
# This file is automatically loaded by docker-compose and provides development-specific settings

version: '3.8'

services:
  prompt-improver-bot:
    # Enable development mode
    environment:
      - EMAIL_ENABLED=true
      - DATABASE_URL=sqlite:///./bot.db # Use SQLite for development
      - REDIS_URL=redis://redis:6379
      - LANGUAGE=RU
    volumes:
      # Mount source code for development (uncomment for live reload)
      # - ./src:/app/src:ro
      # - ./tests:/app/tests:ro
      - ./bot.log:/app/bot.log
      - ./bot.db:/app/bot.db # Persist SQLite database
    # Expose ports for debugging
    # ports:
    #   - "5678:5678"  # Python debugger port

  redis:
    # Development Redis settings
    ports:
      - "6379:6379" # Expose Redis port for development tools
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

  postgres:
    # Development PostgreSQL settings
    ports:
      - "5432:5432" # Expose PostgreSQL port for development tools
    environment:
      POSTGRES_DB: botdb_dev
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass_dev
    # Add development database initialization
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

volumes:
  postgres_dev_data:
    driver: local
