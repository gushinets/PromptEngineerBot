# Python Project Configuration
# ============================
# This file provides tool configuration for the Telegram Prompt Bot project.
# Dependencies are managed via requirements.txt (not this file).

[tool.ruff]
# See ruff.toml for complete configuration
target-version = "py312"
line-length = 100

[tool.bandit]
# See .bandit for complete configuration
exclude_dirs = ["/tests/", "/alembic/versions/", "/.venv/"]
skips = ["B101"]  # assert_used (common in tests)

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --tb=short"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
timeout = 300

[tool.coverage.run]
source = ["telegram_bot"]
omit = [
    "tests/*",
    "test_*.py",
    "*_test.py",
    "*/conftest.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

# Security Tools
# ==============
# This project uses automated security scanning via pre-commit hooks.
# 
# Tools: Ruff, GitLeaks, Bandit, Safety, Semgrep
# Setup: python scripts/setup_security_tools.py
# Docs: docs/security/
#
# Configuration files:
#   - .pre-commit-config.yaml: Pre-commit hook configuration
#   - ruff.toml: Ruff linting and formatting rules
#   - .gitleaks.toml: GitLeaks secrets detection patterns
#   - .bandit: Bandit security analysis configuration
#   - .safety-policy.yml: Safety vulnerability exceptions
#   - .semgrep.yml: Semgrep custom security rules
