# Pre-commit security configuration for Telegram Prompt Engineering Bot
# This configuration runs multiple security tools before each commit to catch vulnerabilities early

default_stages: [pre-commit]
fail_fast: false  # Run all hooks even if one fails to get complete feedback

repos:
  # Ruff - Fast Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      # Ruff linter with auto-fix
      - id: ruff
        name: Ruff Linter (Python security & code quality)
        args: [--fix, --exit-non-zero-on-fix]
        types: [python]
        exclude: ^(\.venv/|__pycache__/|alembic/versions/)
        
      # Ruff formatter
      - id: ruff-format
        name: Ruff Formatter (Python code formatting)
        types: [python]
        exclude: ^(\.venv/|__pycache__/|alembic/versions/)

  # GitLeaks - Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.29.0
    hooks:
      - id: gitleaks
        name: GitLeaks (Secrets detection)
        entry: gitleaks detect --no-git --verbose --redact --config .gitleaks.toml
        language: system
        pass_filenames: false
        exclude: ^(\.venv/|__pycache__/|\.git/|\.env\.example|tests/fixtures/)

  # Bandit - Python security linter
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        name: Bandit (Python security analysis)
        args: [-c, .bandit, -r]
        types: [python]
        exclude: ^(tests/|alembic/versions/|\.venv/)

  # Safety - Dependency vulnerability scanner (v3.7.0)
  - repo: local
    hooks:
      - id: safety
        name: Safety (Dependency vulnerability scanner)
        entry: safety check --json
        language: system
        files: ^(requirements\.txt|pyproject\.toml)$
        pass_filenames: false

  # Semgrep - Pattern-based security analysis (v1.142.1)
  # Uses custom rules from .semgrep.yml
  # To also use community rulesets (OWASP Top 10, Python security), modify entry to:
  #   semgrep scan --config "p/owasp-top-ten" --config "p/python" --config .semgrep.yml --quiet --error
  - repo: local
    hooks:
      - id: semgrep
        name: Semgrep (Pattern-based security analysis)
        entry: semgrep scan --config .semgrep.yml --quiet --error
        language: system
        types: [python]
        exclude: ^(\.venv/|__pycache__/|tests/fixtures/|alembic/versions/)
        pass_filenames: false
