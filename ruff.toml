# Ruff configuration for security and code quality
target-version = "py312"
line-length = 100
indent-width = 4

[lint]
# Enable security-focused rule sets
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort (import sorting)
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "S",      # flake8-bandit (security)
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "EM",     # flake8-errmsg
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "PIE",    # flake8-pie
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "PL",     # pylint
    "TRY",    # tryceratops
    "RUF",    # ruff-specific rules
]

# Ignore specific rules that conflict with project style or cause false positives
ignore = [
    "S101",   # Use of assert (common in tests)
    "S104",   # Possible binding to all interfaces
    "S105",   # Possible hardcoded password (handled by GitLeaks)
    "S106",   # Possible hardcoded password (handled by GitLeaks)
    "S107",   # Possible hardcoded password (handled by GitLeaks)
    "TRY003", # Avoid specifying long messages outside exception class
    "PLR0913", # Too many arguments
    "PLR2004", # Magic value used in comparison
]

# Exclude directories
exclude = [
    ".venv",
    "venv",
    "__pycache__",
    ".git",
    "alembic/versions",
    "build",
    "dist",
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# Ignore certain rules in test files
"tests/**/*.py" = [
    "S101",   # assert usage
    "PLR2004", # magic values
    "S105",   # hardcoded passwords in tests
    "S106",
]

# Ignore import rules in __init__.py
"__init__.py" = ["F401", "F403"]

[lint.isort]
known-first-party = ["telegram_bot"]
force-single-line = false
lines-after-imports = 2

[lint.mccabe]
max-complexity = 10

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
