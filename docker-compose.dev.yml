# Docker Compose development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  prompt-improver-bot:
    restart: unless-stopped
    environment:
      - LOG_LEVEL=DEBUG

  redis:
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    restart: unless-stopped
    ports:
      - "5432:5432"
