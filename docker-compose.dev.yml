# Docker Compose development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  prompt-improver-bot:
    restart: unless-stopped
    environment:
      LOG_LEVEL: INFO
      SMTP_HOST: mailpit

  redis:
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    restart: unless-stopped
    ports:
      - "5432:5432"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI
