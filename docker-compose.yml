services:
  # Main bot application
  prompt-improver-bot:
    build: .
    container_name: prompt-improver-bot
    env_file:
      - .env
    restart: unless-stopped
    command: ["python", "-m", "promptbot.app.runner"]
    depends_on:
      - redis
      - postgres
    volumes:
      # Persist logs only if you enable file logging and ensure permissions
      # Recommended: rely on Docker logs instead of file logging in container
      - ./google_service_key.json:/app/google_service_key.json:ro
    environment:
      # Override database and Redis URLs for container networking
      - DATABASE_URL=postgresql://botuser:botpass@postgres:5432/botdb
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_WRITE_CHECK_STRICT=true
    # Uncomment and set if you need to expose a port for webhook
    # ports:
    #   - "8080:8080"

    # Redis for OTP storage and rate limiting
  redis:
    image: redis:7-alpine
    container_name: prompt-bot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --protected-mode yes --maxmemory 256mb --maxmemory-policy allkeys-lru --rename-command SLAVEOF "" --rename-command REPLICAOF "" --rename-command CONFIG "" --rename-command FLUSHALL ""
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL for persistent data storage
  postgres:
    image: postgres:15-alpine
    container_name: prompt-bot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: botdb
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U botuser -d botdb" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: prompt-bot-network
